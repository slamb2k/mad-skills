name: CI & Release

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate skill structure
        run: npm run validate

      - name: Lint SKILL.md files
        run: npm run lint

  eval:
    name: Run Evals
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check if evals are enabled
        id: gate
        run: |
          if [ "${{ vars.EVALS_ENABLED }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Evals enabled via repository variable"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Evals disabled — set EVALS_ENABLED=true in repo variables to enable"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.gate.outputs.enabled == 'true'

      - name: Run skill evals
        if: steps.gate.outputs.enabled == 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::warning::No API key configured — skipping evals"
            exit 0
          fi
          npm run eval -- --verbose

      - name: Upload eval results
        if: steps.gate.outputs.enabled == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: tests/results/
          retention-days: 30

      - name: Comment eval results on PR
        if: steps.gate.outputs.enabled == 'true' && github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsDir = 'tests/results';

            try {
              const latest = JSON.parse(fs.readFileSync(path.join(resultsDir, 'latest.json'), 'utf8'));
              const results = JSON.parse(fs.readFileSync(latest.file, 'utf8'));

              const { pass, fail, error } = results.summary;
              const total = pass + fail + error;
              const icon = fail + error > 0 ? '❌' : '✅';

              let body = `## ${icon} Skill Eval Results\n\n`;
              body += `**${pass}/${total}** passed | Model: \`${results.model}\`\n\n`;

              for (const skill of results.skills) {
                body += `### 📦 ${skill.skill}\n`;
                for (const r of skill.results) {
                  const ri = r.status === 'pass' ? '✅' : r.status === 'fail' ? '❌' : '💥';
                  body += `- ${ri} ${r.name} (${r.duration_ms}ms)\n`;
                  if (r.status !== 'pass') {
                    for (const a of r.assertions) {
                      if (!a.pass) body += `  - ✗ [${a.type}] ${a.detail}\n`;
                    }
                  }
                }
                body += '\n';
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            } catch (e) {
              console.log('Could not post eval results:', e.message);
            }

  release:
    name: Release
    needs: [validate, eval]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Build manifests
        run: npm run build:manifests

      - name: Bump version, commit, tag
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_VERSION=$(node -p "
            const pkg = require('./package.json');
            const parts = pkg.version.split('.');
            parts[2] = parseInt(parts[2]) + 1;
            parts.join('.');
          ")

          node -e "
            const fs = require('fs');
            for (const file of ['package.json', '.claude-plugin/plugin.json']) {
              const content = JSON.parse(fs.readFileSync(file, 'utf-8'));
              content.version = '${NEW_VERSION}';
              fs.writeFileSync(file, JSON.stringify(content, null, 2) + '\n');
            }
          "

          npm install --package-lock-only

          git add package.json package-lock.json .claude-plugin/plugin.json
          git commit -m "chore(release): v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build .skill packages
        run: npm run build:skills -- --outdir ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/*.skill
