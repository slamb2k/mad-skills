name: CI & Release

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate skill structure
        run: npm run validate

      - name: Lint SKILL.md files
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

  eval:
    name: Run Evals
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check if evals are enabled
        id: gate
        run: |
          if [ "${{ vars.EVALS_ENABLED }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Evals enabled via repository variable"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Evals disabled — set EVALS_ENABLED=true in repo variables to enable"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.gate.outputs.enabled == 'true'

      - name: Run skill evals
        if: steps.gate.outputs.enabled == 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::warning::No API key configured — skipping evals"
            exit 0
          fi
          npm run eval -- --verbose

      - name: Upload eval results
        if: steps.gate.outputs.enabled == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: tests/results/
          retention-days: 30

      - name: Comment eval results on PR
        if: steps.gate.outputs.enabled == 'true' && github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsDir = 'tests/results';

            try {
              const latest = JSON.parse(fs.readFileSync(path.join(resultsDir, 'latest.json'), 'utf8'));
              const results = JSON.parse(fs.readFileSync(latest.file, 'utf8'));

              const { pass, fail, error } = results.summary;
              const total = pass + fail + error;
              const icon = fail + error > 0 ? '❌' : '✅';

              let body = `## ${icon} Skill Eval Results\n\n`;
              body += `**${pass}/${total}** passed | Model: \`${results.model}\`\n\n`;

              for (const skill of results.skills) {
                body += `### 📦 ${skill.skill}\n`;
                for (const r of skill.results) {
                  const ri = r.status === 'pass' ? '✅' : r.status === 'fail' ? '❌' : '💥';
                  body += `- ${ri} ${r.name} (${r.duration_ms}ms)\n`;
                  if (r.status !== 'pass') {
                    for (const a of r.assertions) {
                      if (!a.pass) body += `  - ✗ [${a.type}] ${a.detail}\n`;
                    }
                  }
                }
                body += '\n';
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            } catch (e) {
              console.log('Could not post eval results:', e.message);
            }

  release:
    name: Release
    needs: [validate, eval]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Build manifests
        run: npm run build:manifests

      # Compute the next version and detect whether a prior run already tagged it.
      # If the tag exists, we enter "recovery mode": skip the git bump/commit/push
      # (already done) but still publish/release whatever is missing (idempotent).
      - name: Compute release version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main --tags --quiet

          NEW_VERSION=$(node -p "
            const parts = require('./package.json').version.split('.');
            parts[2] = parseInt(parts[2]) + 1;
            parts.join('.');
          ")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v${NEW_VERSION} already tagged on origin — recovery mode (git bump/tag/push skipped)."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Always applied to the working tree (never committed in recovery mode) so
      # the npm tarball and .skill artifacts carry the correct version.
      - name: Apply version bump
        run: |
          node -e "
            const fs = require('fs');
            for (const file of ['package.json', '.claude-plugin/plugin.json']) {
              const content = JSON.parse(fs.readFileSync(file, 'utf-8'));
              content.version = '${{ steps.version.outputs.version }}';
              fs.writeFileSync(file, JSON.stringify(content, null, 2) + '\n');
            }
          "
          npm install --package-lock-only

      # Publish BEFORE any git write, and only if this version is not already on
      # npm — so a publish failure leaves git untouched and a re-run is clean.
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "${PKG}@${VERSION}" version >/dev/null 2>&1; then
            echo "::notice::${PKG}@${VERSION} already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi

      - name: Build .skill packages
        run: npm run build:skills -- --outdir ./dist

      # Only writes git history for a genuinely new version. Rebase guards against
      # a moved main; the tag/commit guards keep re-runs from colliding.
      - name: Commit, tag, and push
        if: steps.version.outputs.tag_exists == 'false'
        run: |
          git add package.json package-lock.json .claude-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          fi
          git tag -f "v${{ steps.version.outputs.version }}"
          git pull --rebase origin main
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"

      # Idempotent: action-gh-release updates the release if it already exists.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/*.skill
