name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  version-bump:
    name: Create version bump PR
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate
        run: npm run validate

      - name: Lint
        run: npm run lint

      - name: Run evals before release
        if: vars.EVALS_ENABLED == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::warning::No API key configured — skipping evals"
            exit 0
          fi
          npm run eval

      - name: Build manifests
        run: npm run build:manifests

      - name: Bump patch version and create PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Bump patch version in package.json
          NEW_VERSION=$(node -p "
            const pkg = require('./package.json');
            const parts = pkg.version.split('.');
            parts[2] = parseInt(parts[2]) + 1;
            parts.join('.');
          ")

          BRANCH="chore/release-v${NEW_VERSION}"

          # Update all version references
          node -e "
            const fs = require('fs');
            const files = [
              'package.json',
              '.claude-plugin/plugin.json',
              '.claude-plugin/marketplace.json'
            ];
            for (const file of files) {
              try {
                const content = JSON.parse(fs.readFileSync(file, 'utf-8'));
                if (content.version) content.version = '${NEW_VERSION}';
                if (content.plugins) {
                  for (const p of content.plugins) {
                    if (p.version) p.version = '${NEW_VERSION}';
                  }
                }
                fs.writeFileSync(file, JSON.stringify(content, null, 2) + '\n');
              } catch {}
            }
          "

          # Update package-lock.json
          npm install --package-lock-only

          git checkout -b "$BRANCH"
          git add package.json package-lock.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore(release): bump version to ${NEW_VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore(release): bump version to ${NEW_VERSION}" \
            --body "Automated version bump to ${NEW_VERSION}. Auto-merges when checks pass." \
            --label "release"

          gh pr merge "$BRANCH" --squash --auto --delete-branch

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: "startsWith(github.event.head_commit.message, 'chore(release):')"
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create version tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build .skill packages (ZIP format for Claude Code marketplace)
        run: npm run build:skills -- --outdir ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/*.skill
